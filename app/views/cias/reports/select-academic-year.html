{% extends "layoutsld.html" %}

{% block pageTitle %}
GOV.UK Prototype Kit

{% block content %}


<script>
  
function continueBtnClick() {       
  try {

        const select = document.getElementById("academicYearSelection");
        const selectedText = select.options[select.selectedIndex].text;
     
        const params = new URLSearchParams(window.location.search);
        const provider = params.get("provider");
        const ukprn = params.get("ukprn");
     
        const url =  "compare?year="+ encodeURIComponent(selectedText) + "&ukprn=" + encodeURIComponent(ukprn) + "&provider=" + encodeURIComponent(provider);

        window.location.href = url;
      
    } catch (error) {
      console.log(error.message);
    }
}

 

document.addEventListener("DOMContentLoaded", function () {
  
    try {
        const params = new URLSearchParams(window.location.search);
        const year = params.get("year");  
        const provider = params.get("provider");
        const ukprn = params.get("ukprn");
     
    if((year) && (provider) && (ukprn)) 
    {
      const select = document.getElementById("academicYearSelection");

      select.value=year;

      document.getElementById("provider-name").textContent = provider;
      document.getElementById("ukprn-name").textContent = "UKPRN: " + ukprn;      
    }
    
    } catch (error) {
        console.log(error.message);
    }
  


  
  
  
  
  
});

</script>
