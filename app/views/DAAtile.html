{% extends "layoutsld.html" %}

{% block pageTitle %}
GOV.UK Prototype Kit
{% endblock %}

{% block content %}

<body class="govuk-template__body js-enabled">

    <main class="govuk-main-wrapper" id="content" role="main">
        <div class="govuk-grid-row flex">
            
            <div class="govuk-grid-column-three-quarters">

                <h1 id="makeSubmission" class="govuk-heading-l">
                    Make a submission
                </h1>

                <a class="govuk-link" href="/FEWCollectionOverview"> 
                    <img src="/public/images/FEWOpen.PNG" width="180" height="120">
                </a> 
                <a class="govuk-link" href="/FEWGStart"> 
                    <img src="/public/images/FEWG.PNG" width="180" height="120">
                </a> 
                <a class="govuk-link" href="/HecosExport"> 
                    <img src="/public/images/HECOSTile.png" width="180" height="115">
                </a> 
                <a class="govuk-link" href="/fundingclaimsubmissions"> 
                    <img src="/public/images/fundingclaims.jpg" width="180" height="120">
                </a>

                <a class="govuk-link" href="/DAAllocations" style="text-decoration: none; display: inline-block; vertical-align: top;">
                    <div style="width: 180px; height: 120px; background-color: #1d70b8; color: white; position: relative; font-family: 'GDS Transport', arial, sans-serif;">
                        <div style="padding: 10px 10px 0 10px;">
                            <div style="font-weight: bold; font-size: 19px; line-height: 1.2;">DA Allocations</div>
                            <div style="font-size: 14px; margin-top: 5px; line-height: 1.2;">Devolved Authority Allocations</div>
                        </div>
                        <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 28px; background-color: #00703c; padding: 4px 10px; box-sizing: border-box;">
                            <span style="font-weight: bold; font-size: 16px;">R01 Open</span>
                        </div>
                    </div>
                </a>

                <h1 class="govuk-heading-l">Reports and data</h1>

                <a class="govuk-link" href="/FEWSubmissionHistory"> 
                    <img src="/public/images/FEWClosed.PNG" width="180" height="120">
                </a> 

                <a class="govuk-link" href="/DAASubmissionHistory" style="text-decoration: none; display: inline-block; vertical-align: top;">
                    <div style="width: 215px; height: 125px; border: 1px solid #b1b4b6; font-family: 'GDS Transport', arial, sans-serif; box-sizing: border-box;">
                        <div style="background-color: #f8f8f8; padding: 12px 10px; height: 80px; box-sizing: border-box;">
                            <div style="font-weight: bold; font-size: 18px; line-height: 1.2; color: #1d70b8;">DA Allocations</div>
                            <div style="font-weight: bold; font-size: 16px; line-height: 1.2; color: #1d70b8; margin-top: 2px;">Devolved Authority Allocations</div>
                        </div>
                        <div style="background-color: #ffffff; height: 43px; padding: 8px 10px; border-top: 1px solid #b1b4b6; box-sizing: border-box;">
                            <span style="font-size: 19px; color: #0b0c0c;">View submissions</span>
                        </div>
                    </div>
                </a>

                <a class="govuk-link" href="/ReportsMenu"> 
                    <img src="/public/images/reports.png" width="180" height="120">
                </a>
                
                <a class="govuk-link" href="/FEWGovernorSubmissions"> 
                    <img src="/public/images/FEWGClosed.PNG" width="180" height="120">
                </a>

                <a class="govuk-link" href="/powerbidashboards"> 
                    <img src="/public/images/dashboards.jpg" width="180" height="120">
                </a> 

            </div>
            
            <div class="govuk-grid-column-one-quarter">
                </div>
        </div>
    </main>
</body>

{% endblock %}
