
{% extends "layoutsld.html" %}

{% block pageTitle %}
GOV.UK Prototype Kit
{% endblock %}

{% block content %}


<script>
  function handleSelect(radio) {
    document.getElementById("continueBtnFileType").disabled = false;
  }

  function handleBtnClick(btn) {
    
    
    if (document.getElementById("ilrFileType").checked)
    { 
      window.location.href = "./PDSAT_CrossILR_SelectReturnPeriodILR.html";
    }
    else
    { 
      window.location.href = "./PDSAT_CrossILR_SelectReturnPeriodFIS.html";
    }
  }

</script>


<a href="javascript:history.back()" class="govuk-back-link">Back</a>

<main class="govuk-main-wrapper" id="content" role="main">

  <div class="govuk-grid-row">

    <div class="govuk-grid-column-full">

      <h1 class="govuk-heading-xl">Cross ILR Compare</h1>

      <form>

        <div class="govuk-form-group">
        <fieldset class="govuk-fieldset" aria-describedby="changedName-hint">
          <legend class="govuk-fieldset__legend govuk-fieldset__legend--l"> </legend>
          <div id="changedName-hint" class="govuk-hint">
            Please select the ILR file type you wish to compare?
          </div>
          <div class="govuk-radios govuk-radios--inline" data-module="govuk-radios">
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="ilrFileType" name="fileTypeToCompare" type="radio" value="ilr" onclick="handleSelect(this)">
              <label class="govuk-label govuk-radios__label" for="ilrFileTypeName">
                ILR
              </label>
            </div>
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="fisFileType" name="fileTypeToCompare" type="radio" value="fis" onclick="handleSelect(this)" >
              <label class="govuk-label govuk-radios__label" for="ilrFileTypeName-2">
                FIS
              </label>
            </div>
          </div>
        </fieldset>
      </div>

        <button 
          type="button"
          class="govuk-button govuk-button--start"
          id="continueBtnFileType"
          disabled
          onclick="handleBtnClick(this)">
          Continue
          <svg class="govuk-button__start-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="17.5"
              height="19"
              viewBox="0 0 33 40"
              aria-hidden="true"
              focusable="false">
            <path fill="currentColor" d="M0 0h13l20 20-20 20H0l20-20z" />
          </svg>
        </button>

      </form>

    </div>
   

    </div>

  </div>

</main>

{% endblock %}
